name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump version in plugin.json and updater.json
        run: |
          jq --arg v "${{ inputs.version }}" '.version = $v' plugin.json > tmp.json && mv tmp.json plugin.json
          jq --arg v "${{ inputs.version }}" '.["*"].version = $v' updater.json > tmp.json && mv tmp.json updater.json

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugin.json updater.json
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git push

      - name: Build release zip
        run: |
          mkdir -p /tmp/release/vcenter-vps
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            . /tmp/release/vcenter-vps/
          cd /tmp/release
          zip -r vcenter-vps.zip vcenter-vps/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          files: /tmp/release/vcenter-vps.zip
